<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KhanLab Docusaurus Theme</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: rgba(255,255,255,0.1);
      --text: #f4f4f5;
      --muted: #71717a;
      --accent: #22d3ee;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'IBM Plex Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      max-width: 520px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      text-align: center;
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.75rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      letter-spacing: -0.03em;
    }
    .accent { color: var(--accent); }
    p {
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 1.5rem;
      font-size: 1rem;
    }
    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
    }
    a.btn, button.btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.25rem;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      text-decoration: none;
      border-radius: 10px;
      transition: transform 0.15s, background 0.15s;
      cursor: pointer;
      border: none;
      font: inherit;
    }
    a.btn-primary {
      background: var(--accent);
      color: #050508;
    }
    a.btn-primary:hover {
      background: #67e8f9;
      transform: translateY(-2px);
    }
    a.btn-secondary, button.btn-secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }
    a.btn-secondary:hover, button.btn-secondary:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-2px);
    }
    .btn svg { width: 1.1em; height: 1.1em; flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="card">
    <h1>KhanLab <span class="accent">Theme</span></h1>
    <p>Dark minimal theme for Docusaurus. Syne + IBM Plex, cyan accent. Free & open source.</p>
    <div class="buttons">
      <a href="https://the-khan-labs.github.io/khanlab-docusaurus-theme/" class="btn btn-primary">
        View Demo →
      </a>
      <a href="https://github.com/The-Khan-Labs/khanlab-docusaurus-theme" class="btn btn-secondary">
        <svg fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
        GitHub
      </a>
      <button class="btn btn-secondary" onclick="share()" id="shareBtn">
        <svg fill="currentColor" viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg>
        Share
      </button>
    </div>
  </div>
  <script>
    function share() {
      const url = 'https://the-khan-labs.github.io/khanlab-docusaurus-theme/';
      if (navigator.share) {
        navigator.share({
          title: 'KhanLab Docusaurus Theme',
          text: 'Dark minimal theme for Docusaurus — free & open source',
          url: url
        }).then(() => {}).catch(() => copyFallback(url));
      } else {
        copyFallback(url);
      }
    }
    function copyFallback(url) {
      navigator.clipboard.writeText(url).then(() => {
        const btn = document.getElementById('shareBtn');
        const orig = btn.innerHTML;
        btn.innerHTML = 'Copied!';
        btn.style.color = 'var(--accent)';
        setTimeout(() => { btn.innerHTML = orig; btn.style.color = ''; }, 2000);
      });
    }
  </script>
</body>
</html>
